global:
  resolve_timeout: 5m

route:
  receiver: default
  group_by: [alertname, service, severity]
  group_wait: 5s
  group_interval: 2m
  repeat_interval: 4h
  routes:
    - receiver: critical
      matchers:
        - severity="critical"
    - receiver: warning
      matchers:
        - severity="warning"

receivers:
  - name: default
    webhook_configs:
      - url: http://alert-webhook:5001/alerts
        send_resolved: true
  - name: warning
    webhook_configs:
      - url: http://alert-webhook:5001/alerts/warning
        send_resolved: true
  - name: critical
    webhook_configs:
      - url: http://alert-webhook:5001/alerts/critical
        send_resolved: true

inhibit_rules:
  - source_matchers:
      - severity="critical"
    target_matchers:
      - severity="warning"
    equal:
      - alertname
      - service
