name: CI

on:
  pull_request:
  push:
    branches:
      - main
      - develop

jobs:
  quality:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: blogsnap
          POSTGRES_USER: blogsnap
          POSTGRES_PASSWORD: blogsnap
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U blogsnap -d blogsnap"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 20
    env:
      DATABASE_URL: postgresql+psycopg://blogsnap:blogsnap@127.0.0.1:5432/blogsnap
      PIP_DISABLE_PIP_VERSION_CHECK: "1"
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: requirements.txt

      - name: Run Day14 CI suite
        run: |
          chmod +x scripts/day14_ci_suite.sh scripts/day12_env_check.sh
          ./scripts/day14_ci_suite.sh
