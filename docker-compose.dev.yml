services:
  postgres:
    image: postgres:16-alpine
    container_name: blogsnap-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: blogsnap
      POSTGRES_USER: blogsnap
      POSTGRES_PASSWORD: blogsnap
    ports:
      - "55432:5432"
    volumes:
      - blogsnap_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U blogsnap -d blogsnap"]
      interval: 5s
      timeout: 3s
      retries: 10

  api:
    build:
      context: .
      dockerfile: Dockerfile.backend
    container_name: blogsnap-api
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql+psycopg://blogsnap:blogsnap@postgres:5432/blogsnap
      WORKER_PUBLISH_MODE: mock
      LOG_LEVEL: INFO
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "8000:8000"
    command: ["python", "-m", "uvicorn", "backend.app.main:app", "--host", "0.0.0.0", "--port", "8000"]

  worker:
    build:
      context: .
      dockerfile: Dockerfile.backend
    container_name: blogsnap-worker
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql+psycopg://blogsnap:blogsnap@postgres:5432/blogsnap
      WORKER_PUBLISH_MODE: mock
      WORKER_POLL_SECONDS: 3
      WORKER_BATCH_SIZE: 10
      LOG_LEVEL: INFO
    depends_on:
      postgres:
        condition: service_healthy
    command: ["python", "-m", "backend.app.worker.run_forever"]

  prometheus:
    image: prom/prometheus:v2.55.1
    container_name: blogsnap-prometheus
    restart: unless-stopped
    depends_on:
      api:
        condition: service_started
    ports:
      - "9090:9090"
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./monitoring/rules:/etc/prometheus/rules:ro

  alertmanager:
    image: prom/alertmanager:v0.28.0
    container_name: blogsnap-alertmanager
    restart: unless-stopped
    depends_on:
      alert-webhook:
        condition: service_started
    ports:
      - "9093:9093"
    volumes:
      - ./monitoring/alertmanager/alertmanager.yml:/etc/alertmanager/alertmanager.yml:ro
    command: ["--config.file=/etc/alertmanager/alertmanager.yml"]

  alert-webhook:
    image: python:3.12-alpine
    container_name: blogsnap-alert-webhook
    restart: unless-stopped
    ports:
      - "5001:5001"
    environment:
      ALERT_FORWARD_WEBHOOK_URL: ${ALERT_FORWARD_WEBHOOK_URL:-}
      ALERT_FORWARD_TIMEOUT_SECONDS: ${ALERT_FORWARD_TIMEOUT_SECONDS:-5}
    volumes:
      - ./monitoring/alert_webhook/server.py:/app/server.py:ro
      - ./tmp/alert-webhook:/data
    command: ["python", "/app/server.py"]

  webhook-sink:
    image: python:3.12-alpine
    container_name: blogsnap-webhook-sink
    restart: unless-stopped
    ports:
      - "5002:5002"
    volumes:
      - ./monitoring/mock_sink/server.py:/app/server.py:ro
      - ./tmp/webhook-sink:/data
    command: ["python", "/app/server.py"]

  grafana:
    image: grafana/grafana:11.3.0
    container_name: blogsnap-grafana
    restart: unless-stopped
    depends_on:
      prometheus:
        condition: service_started
    ports:
      - "3000:3000"
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD:-admin}
    volumes:
      - ./monitoring/grafana/provisioning/datasources:/etc/grafana/provisioning/datasources:ro
      - ./monitoring/grafana/provisioning/dashboards:/etc/grafana/provisioning/dashboards:ro
      - ./monitoring/grafana/dashboards:/etc/grafana/provisioning/dashboards_json:ro

volumes:
  blogsnap_pgdata:
